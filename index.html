<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Token System</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#0066cc;
}

input,select{
width:90%;
padding:10px;
margin-bottom:12px;
}

button{
width:90%;
padding:12px;
background:#0066cc;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

.ticket{
display:none;
margin-top:20px;
border:2px solid #000;
padding:20px;
}

.ticket h2{
text-align:center;
margin-bottom:20px;
}

.row-flex{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.prescription{
margin-top:20px;
}

.prescription-box{
height:220px;
border:1px solid #000;
margin-top:10px;
padding:10px;
}

.print-btn{
margin-top:15px;
background:green;
}

@media print {
body *{
visibility:hidden;
}

.ticket, .ticket *{
visibility:visible;
}

.ticket{
position:absolute;
left:0;
top:0;
width:100%;
}

button{
display:none;
}
}
</style>
</head>

<body>

<div class="container">

<h1>Hospital OPD Token System</h1>

<label>Name</label>
<input type="text" id="name">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Phone</label>
<input type="text" id="phone">

<label>Department</label>
<select id="department">
<option>Medicine</option>
<option>Surgery</option>
<option>Orthopedics</option>
<option>ENT</option>
<option>Cardiology</option>
</select>

<label>Visit Date</label>
<input type="date" id="visitdate">

<button onclick="generateToken()">Generate Token</button>

<div class="ticket" id="ticket">

<h2>SHAHEED CHANDRARAUDRI MEDICAL COLLEGE HOSPITAL</h2>

<div class="row-flex">
<div><b>Token:</b> <span id="t_token"></span></div>
<div><b>Name:</b> <span id="t_name"></span></div>
<div><b>DOB:</b> <span id="t_dob"></span></div>
<div><b>Gender:</b> <span id="t_gender"></span></div>
</div>

<div class="row-flex">
<div><b>Phone:</b> <span id="t_phone"></span></div>
<div><b>Department:</b> <span id="t_department"></span></div>
<div><b>Visit:</b> <span id="t_visitdate"></span></div>
</div>

<div class="prescription">
<b>Doctor Notes / Prescription</b>
<div class="prescription-box"></div>
</div>

<button class="print-btn" onclick="window.print()">Print Ticket</button>

</div>

</div>

<script>

let tokenCounter = localStorage.getItem("tokenCounter") || 0;

function generateToken(){

tokenCounter++;
localStorage.setItem("tokenCounter", tokenCounter);

let token = "OPD-" + String(tokenCounter).padStart(3,'0');

document.getElementById("t_token").innerText = token;
document.getElementById("t_name").innerText = document.getElementById("name").value;
document.getElementById("t_dob").innerText = document.getElementById("dob").value;
document.getElementById("t_gender").innerText = document.getElementById("gender").value;
document.getElementById("t_phone").innerText = document.getElementById("phone").value;
document.getElementById("t_department").innerText = document.getElementById("department").value;
document.getElementById("t_visitdate").innerText = document.getElementById("visitdate").value;

document.getElementById("ticket").style.display = "block";
}

</script>

</body>
</html>
