<!DOCTYPE html>
<html>
<head>
<title>Hospital Token System</title>
<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}
.container{
max-width:1000px;
margin:auto;
background:White;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}
input,select{
width:90%;
padding:10px;
margin:8px 0;
}
button{
background:#007bff;
color:white;
padding:12px;
border:none;
width:100%;
cursor:pointer;
}
.token{
margin-top:20px;
padding:15px;
background:#eaf7ea;
}
</style>
</head>

<body>

<div class="container">

<h2>Hospital OPD Token System</h2>

<form id="tokenForm">

<input type="text"
placeholder="Patient Name"
required>

<input type="number"
placeholder="Age"
required>

<select required>
<option>Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="tel"
placeholder="Mobile Number"
required>

<select required>
<option>Department</option>
<option>Medicine</option>
<option>Surgery</option>
<option>Orthopedics</option>
<option>ENT</option>
<option>Cardiology</option>
</select>

  <p>Date Of Birth</p> 
<input type="date" 
required>

<button type="submit">
Generate Token
</button>

</form>

<div id="result"></div>

</div>

<script>

document.getElementById("tokenForm")
.addEventListener("submit",function(e){

e.preventDefault();

let token=
"TK"+Math.floor(Math.random()*10000);

document.getElementById("result")
.innerHTML=

`<div class="token">
<h3>Your Token</h3>
<h2>${token}</h2>
<p>Please wait for your turn.</p>
</div>`;

});

</script>

</body>
</html>
