<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Token System</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0066cc;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
background:#0066cc;
color:white;
padding:12px;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
}

.ticket{
display:none;
margin-top:20px;
border:2px solid #000;
padding:20px;
background:white;
}

.ticket h2{
text-align:center;
margin-bottom:20px;
}

.row{
margin-bottom:10px;
}

.print-btn{
margin-top:15px;
background:green;
}
</style>
</head>

<body>

<div class="container">

<h1>Hospital OPD Token System</h1>

<label>Patient Name</label>
<input type="text" id="name">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Mobile Number</label>
<input type="text" id="phone">

<label>Department</label>
<select id="department">
<option>Medicine</option>
<option>Surgery</option>
<option>Orthopedics</option>
<option>ENT</option>
<option>Cardiology</option>
</select>

<label>Visit Date</label>
<input type="date" id="visitdate">

<button onclick="generateToken()">
Generate Token
</button>

<div class="ticket" id="ticket">

<h2>
SHAHEED SUHRAWARDY MEDICAL COLLEGE HOSPITAL
</h2>

<div class="row"><b>Token No:</b> <span id="t_token"></span></div>

<div class="row"><b>Patient Name:</b> <span id="t_name"></span></div>

<div class="row"><b>Date of Birth:</b> <span id="t_dob"></span></div>

<div class="row"><b>Gender:</b> <span id="t_gender"></span></div>

<div class="row"><b>Phone:</b> <span id="t_phone"></span></div>

<div class="row"><b>Department:</b> <span id="t_department"></span></div>

<div class="row"><b>Visit Date:</b> <span id="t_visitdate"></span></div>

<hr>

<h3>Doctor Notes / Prescription</h3>

<br><br><br><br><br>

<button class="print-btn" onclick="window.print()">
Print Ticket
</button>

</div>

</div>

<script>

let tokenCounter = localStorage.getItem("tokenCounter") || 0;

function generateToken(){

tokenCounter++;

localStorage.setItem("tokenCounter",tokenCounter);

let token =
"OPD-" +
String(tokenCounter).padStart(3,'0');

document.getElementById("t_token").innerText = token;

document.getElementById("t_name").innerText =
document.getElementById("name").value;

document.getElementById("t_dob").innerText =
document.getElementById("dob").value;

document.getElementById("t_gender").innerText =
document.getElementById("gender").value;

document.getElementById("t_phone").innerText =
document.getElementById("phone").value;

document.getElementById("t_department").innerText =
document.getElementById("department").value;

document.getElementById("t_visitdate").innerText =
document.getElementById("visitdate").value;

document.getElementById("ticket").style.display="block";
}

</script>

</body>
</html>
